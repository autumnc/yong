#FbTerm输入法配色配置文件
#此文件位于 ~/.yong/fbterm.ini，首次运行自动生成

#颜色值支持以下格式：
#  颜色名：Black, DarkRed, DarkGreen, DarkYellow, DarkBlue, DarkMagenta,
#          DarkCyan, Gray, DarkGray, Red, Green, Yellow, Blue, Magenta,
#          Cyan, White
#  Hex RGB：#RRGGBB（如 #FF8800）或 #RGB 缩写（如 #F80），自动映射到
#           xterm 256色调色板最接近的颜色

[input]
#输入窗口背景色
bg = White
#编码文字 / 候选字序号
text = Black
#当前选中的候选字
select = Blue
#编码提示文字
tips = Red
#光标颜色
caret = Black
#翻页指示文字
page = Black

[main]
#状态栏背景色
bg = White
#状态栏按钮文字颜色
text = Blue
